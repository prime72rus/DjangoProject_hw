{% extends 'catalog/base.html' %}
{% block title %}Добавить пост{% endblock %}

{% block content_1 %}
{% include 'catalog/includes/header.html' %}
<div class="pricing-header px-3 py-3 pt-md-5 pb-md-4 mx-auto text-center">
	<h1 class="display-4">Удаление поста</h1>
</div>
{% endblock %}

{% block content_2 %}
<div class="container">
	<div class="row justify-content-center">
		<div class="col-md-8">
			<div class="card shadow-sm">
				<div class="card-header">
					<h2 class="h4 mb-0">Удалить пост</h2>
				</div>
				<div class="card-body">
					<form method="post">
						{% csrf_token %}
						<div>
							<h2 class="mt-5">Вы действительно хотите удалить этот пост?</h2>
						</div>
						<div class="d-flex justify-content-between mt-4">
							<button type="submit" class="p-2 btn btn-outline-danger mt-3">Да, хочу</button>
							<a href="{% url 'blog:posts_list' %}" class="p-2 btn btn-outline-primary mt-3">Отмена</a>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
</div>
{% endblock %}
